name: Deploy FastAPI Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js & Build Frontend
        uses: actions/setup-node@v4
        with:
          node-version: 20
        env:
          VITE_API_URL: /api
      - run: |
          cd frontend
          npm install
          npx vite build  # This generates the 'dist' folder inside GitHub Actions

      - name: Execute Remote Deployment Steps
        run: |
          # 1. Save the SSH private key
          echo "${{ secrets.EC2_SSH_KEY }}" > ec2_key.pem
          chmod 600 ec2_key.pem

          echo "Testing connectivity..."
          if ! ssh -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo 'SSH Connection Successful!'" ; then
            echo "ERROR: Network reachable, but SSH key authentication failed."
            rm -f ec2_key.pem
            exit 1
          fi

          echo "Testing folder permission..."
          if ! ssh -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "[ -w '${{ secrets.DEPLOY_PATH }}' ]" ; then
            echo "ERROR: Target folder is not writable by ${{ secrets.EC2_USER }}."
            rm -f ec2_key.pem
            exit 1
          fi

          echo "Deploying files via Rsync..."
          rsync -avz --delete \
            -e "ssh -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --exclude '.git*' \
            --exclude 'venv/' \
            --exclude '__pycache__/' \
            --exclude '.env' \
            --exclude 'node_modules/' \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.DEPLOY_PATH }}

          echo "Validating services and restarting..."
          ssh -i ec2_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            source ${{ secrets.DEPLOY_PATH_BACKEND }}/venv/bin/activate || true
            pip install -r ${{ secrets.DEPLOY_PATH_BACKEND }}/requirements.txt --upgrade
            sudo nginx -t
            sudo systemctl restart uvicorn
            sudo systemctl reload nginx
          "

          # Clean up
          rm -f ec2_key.pem
