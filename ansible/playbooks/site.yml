- name: Provision Resume Vault server
  hosts: "{{ target_group | default('production') }}"
  become: true
  roles:
    - role: common
      tags: common

    - role: nodejs
      tags: nodejs

    - role: python
      tags: python

    - role: postgresql
      tags: postgresql

    - role: docker
      tags: docker

    - role: redis
      tags: redis

    - role: backend_env
      tags: backend_env

    - role: uvicorn
      tags: uvicorn

    # HTTP nginx only
    - role: nginx
      tags: nginx

    - role: certbot
      tags: certbot
      when: "'production' in group_names"

    # HTTPS nginx
    - role: nginx
      tags: [nginx, certbot]
      when: "'production' in group_names"
      
    - role: monit
      tags: monit