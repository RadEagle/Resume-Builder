---
- name: Install common packages
  ansible.builtin.package:
    name: "{{ common_packages }}"
    state: present
  when: ansible_os_family in ["RedHat", "Debian"]

- name: Ensure deploy directory exists
  ansible.builtin.file:
    path: "{{ deploy_path }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"